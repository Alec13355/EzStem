<mat-toolbar color="primary">
  <span class="brand-icon" aria-hidden="true">🌿</span>
  <span class="brand-name">EzStem</span>
  <span style="flex: 1;"></span>
  @if (authService.isAuthenticated()) {
    <button mat-button routerLink="/items" routerLinkActive="active">Items</button>
    <button mat-button routerLink="/recipes" routerLinkActive="active">Recipes</button>
    <button mat-button routerLink="/events" routerLinkActive="active">Events</button>
    <button mat-button routerLink="/orders" routerLinkActive="active">Orders</button>
    <button mat-button routerLink="/settings/pricing" routerLinkActive="active">Pricing Settings</button>
    <button mat-icon-button (click)="signOut()" title="Sign out">
      <mat-icon>logout</mat-icon>
    </button>
  }
</mat-toolbar>

<div class="app-content">
  <router-outlet />
</div>
