name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx ng build --configuration production

  infra:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      id-token: write
      contents: read
    outputs:
      swa_api_key: ${{ steps.swa-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location centralus

      - name: Get SP identity
        id: sp
        run: |
          APP_ID=$(az account show --query user.name -o tsv)
          OID=$(az ad sp show --id "$APP_ID" --query id -o tsv)
          NAME=$(az ad sp show --id "$APP_ID" --query displayName -o tsv)
          echo "oid=$OID" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Deploy Bicep infrastructure
        working-directory: infra
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file main.bicep \
            --parameters environment=dev \
            --parameters aadAdminObjectId="${{ steps.sp.outputs.oid }}" \
            --parameters aadAdminName="${{ steps.sp.outputs.name }}" \
            --parameters principalType=Application

      - name: Install MSSQL ODBC driver
        run: |
          UBUNTU_VERSION=$(lsb_release -rs)
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${UBUNTU_VERSION}/prod.list" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
          sudo apt-get update -q
          ACCEPT_EULA=Y sudo apt-get install -y -q msodbcsql18

      - name: Provision SQL user for App Service MI
        run: |
          SQL_SERVER=$(az deployment group show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name main \
            --query "properties.outputs.sqlServerName.value" -o tsv)
          APP_MI_NAME="${{ secrets.AZURE_WEBAPP_NAME }}"
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://database.windows.net/ \
            --query accessToken -o tsv)
          DB_NAME="${SQL_SERVER%-sql}-db"
          pip install pyodbc --quiet
          SQL_SERVER="$SQL_SERVER" DB_NAME="$DB_NAME" \
            APP_MI_NAME="$APP_MI_NAME" ACCESS_TOKEN="$ACCESS_TOKEN" \
            python3 .github/scripts/provision_sql_user.py

      - name: Get SWA deployment token
        id: swa-key
        run: |
          SWA_NAME=$(az deployment group show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name main \
            --query "properties.outputs.swaName.value" -o tsv)
          KEY=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.apiKey" -o tsv)
          echo "key=$KEY" >> $GITHUB_OUTPUT

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [infra]
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Publish .NET application
        working-directory: ./backend
        run: |
          dotnet publish src/EzStem.API/EzStem.API.csproj \
            --configuration Release \
            --output ./publish
      
      - name: Create deployment package
        working-directory: ./backend/publish
        run: zip -r ../deploy.zip .
      
      - name: Verify App Service settings
        run: |
          echo "=== Verifying App Service connection string is set ==="
          HAS_CONN=$(az webapp config appsettings list \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?name=='ConnectionStrings__DefaultConnection'] | length(@)" \
            -o tsv)
          echo "ConnectionStrings__DefaultConnection key count: $HAS_CONN"
          if [ "$HAS_CONN" = "0" ]; then
            echo "ERROR: ConnectionStrings__DefaultConnection is NOT set!"
            exit 1
          fi

      - name: Deploy to Azure Web App
        run: |
          # Stream container logs in background so we capture .NET stdout/stderr in real-time
          az webapp log tail \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --timeout 720 > /tmp/streaming-logs.txt 2>&1 &
          STREAM_PID=$!
          sleep 3  # brief pause to let streaming connect

          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src-path ./backend/deploy.zip \
            --type zip
          DEPLOY_EXIT=$?

          sleep 5
          kill $STREAM_PID 2>/dev/null || true

          echo "=== Streaming container logs (real-time .NET stdout) ==="
          cat /tmp/streaming-logs.txt || true

          exit $DEPLOY_EXIT
      
      - name: Capture App Service logs on failure
        if: failure()
        run: |
          echo "=== App Service runtime logs ==="
          LOG_DIR="./app-logs"
          mkdir -p "$LOG_DIR"
          az webapp log download \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --log-file "$LOG_DIR/app-logs.zip" 2>&1 || true
          if [ -f "$LOG_DIR/app-logs.zip" ]; then
            unzip -o "$LOG_DIR/app-logs.zip" -d "$LOG_DIR" 2>/dev/null || true
            echo "=== Application logs (stdout/stderr) ==="
            find "$LOG_DIR" -path "*/Application/*.txt" -type f | sort | tail -3 \
              | xargs -I{} sh -c 'echo "--- {} ---"; tail -400 {}' 2>/dev/null \
              || echo "(no Application/*.txt logs found)"
            echo "=== Docker container state logs ==="
            find "$LOG_DIR" -name "*docker.log" -type f | sort | tail -2 \
              | xargs -I{} sh -c 'echo "--- {} ---"; tail -150 {}' 2>/dev/null \
              || echo "(no docker.log found)"
          fi
      
      - name: Smoke test
        run: |
          sleep 45
          curl --fail https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [infra]
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.infra.outputs.swa_api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend/browser
          app_build_command: npx ng build --configuration production

