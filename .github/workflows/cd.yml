name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx ng build --configuration production

  infra:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      id-token: write
      contents: read
    outputs:
      swa_api_key: ${{ steps.swa-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location centralus

      - name: Get SP identity
        id: sp
        run: |
          APP_ID=$(az account show --query user.name -o tsv)
          OID=$(az ad sp show --id "$APP_ID" --query id -o tsv)
          NAME=$(az ad sp show --id "$APP_ID" --query displayName -o tsv)
          echo "oid=$OID" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Deploy Bicep infrastructure
        working-directory: infra
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file main.bicep \
            --parameters environment=dev \
            --parameters aadAdminObjectId="${{ steps.sp.outputs.oid }}" \
            --parameters aadAdminName="${{ steps.sp.outputs.name }}" \
            --parameters principalType=Application

      - name: Get SWA deployment token
        id: swa-key
        run: |
          SWA_NAME=$(az staticwebapp list \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[0].name" -o tsv)
          KEY=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> $GITHUB_OUTPUT

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [infra]
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Publish .NET application
        working-directory: ./backend
        run: |
          dotnet publish src/EzStem.API/EzStem.API.csproj \
            --configuration Release \
            --output ./publish \
            --runtime linux-x64 \
            --self-contained false
      
      - name: Create deployment package
        working-directory: ./backend/publish
        run: zip -r ../deploy.zip .
      
      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src-path ./backend/deploy.zip \
            --type zip \
            --async true
      
      - name: Smoke test
        run: |
          sleep 45
          curl --fail https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [infra]
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.infra.outputs.swa_api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend
          app_build_command: npx ng build --configuration production

