name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Build and push Docker image
        working-directory: ./backend
        run: |
          docker build -f src/EzStem.API/Dockerfile -t ${{ secrets.ACR_LOGIN_SERVER }}/ezstem-api:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/ezstem-api:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ezstem-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/ezstem-api:latest
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/ezstem-api:${{ github.sha }}
      
      - name: Smoke test
        run: |
          sleep 30
          curl --fail https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build production
        working-directory: ./frontend
        run: npx ng build --configuration production
      
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Upload to Azure Blob Storage
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --destination '$web' \
            --source ./frontend/dist/ezstem/browser \
            --overwrite true \
            --auth-mode login
      
      - name: Purge CDN endpoint
        if: ${{ secrets.AZURE_CDN_ENDPOINT != '' }}
        run: |
          az cdn endpoint purge \
            --resource-group ezstem-rg-prod \
            --profile-name ezstem-cdn \
            --name ${{ secrets.AZURE_CDN_ENDPOINT }} \
            --content-paths '/*'
