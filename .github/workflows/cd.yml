name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build

      - name: Publish
        run: dotnet publish src/EzStem.API/EzStem.API.csproj --configuration Release --no-build --output ./publish

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: backend/publish
          retention-days: 1

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - run: npm ci
      - run: npx ng build --configuration production

  infra:
    runs-on: ubuntu-latest
    needs: [build-backend, test-frontend]
    permissions:
      id-token: write
      contents: read
    outputs:
      swa_api_key: ${{ steps.swa-key.outputs.key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location centralus

      - name: Get SP identity
        id: sp
        run: |
          APP_ID=$(az account show --query user.name -o tsv)
          OID=$(az ad sp show --id "$APP_ID" --query id -o tsv)
          NAME=$(az ad sp show --id "$APP_ID" --query displayName -o tsv)
          echo "oid=$OID" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Deploy Bicep infrastructure
        working-directory: infra
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file main.bicep \
            --parameters environment=dev \
            --parameters aadAdminObjectId="${{ steps.sp.outputs.oid }}" \
            --parameters aadAdminName="${{ steps.sp.outputs.name }}" \
            --parameters principalType=Application

      - name: Install MSSQL ODBC driver
        run: |
          UBUNTU_VERSION=$(lsb_release -rs)
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${UBUNTU_VERSION}/prod.list" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list > /dev/null
          sudo apt-get update -q
          ACCEPT_EULA=Y sudo apt-get install -y -q msodbcsql18

      - name: Provision SQL user for App Service MI
        run: |
          SQL_SERVER=$(az deployment group show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name main \
            --query "properties.outputs.sqlServerName.value" -o tsv)
          APP_MI_NAME="${{ secrets.AZURE_WEBAPP_NAME }}"
          # Get the App Service MI's Object ID directly — passed to the script so it
          # can build the SID without needing FROM EXTERNAL PROVIDER (which requires
          # Directory Readers on the SQL Server identity).
          APP_MI_OID=$(az webapp identity show \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query principalId -o tsv)
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://database.windows.net/ \
            --query accessToken -o tsv)
          DB_NAME="${SQL_SERVER%-sql}-db"
          pip install pyodbc --quiet
          SQL_SERVER="$SQL_SERVER" DB_NAME="$DB_NAME" \
            APP_MI_NAME="$APP_MI_NAME" APP_MI_OID="$APP_MI_OID" \
            ACCESS_TOKEN="$ACCESS_TOKEN" \
            python3 .github/scripts/provision_sql_user.py

      - name: Get SWA deployment token
        id: swa-key
        run: |
          SWA_NAME=$(az deployment group show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name main \
            --query "properties.outputs.swaName.value" -o tsv)
          KEY=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.apiKey" -o tsv)
          echo "key=$KEY" >> $GITHUB_OUTPUT

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [infra]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create deployment package
        working-directory: ./publish
        run: zip -r ../deploy.zip .

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src-path ./deploy.zip \
            --type zip

      - name: Smoke test (retry up to 2 min)
        run: |
          URL="https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          for i in {1..8}; do
            echo "Attempt $i/8..."
            if curl --fail --silent --max-time 10 "$URL"; then
              echo ""
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 8 attempts"
          exit 1

      - name: Capture App Service logs on failure
        if: failure()
        run: |
          LOG_DIR="./app-logs"
          mkdir -p "$LOG_DIR"
          az webapp log download \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --log-file "$LOG_DIR/app-logs.zip" 2>&1 || true
          if [ -f "$LOG_DIR/app-logs.zip" ]; then
            unzip -o "$LOG_DIR/app-logs.zip" -d "$LOG_DIR" 2>/dev/null || true
            echo "=== Application logs ==="
            find "$LOG_DIR" -path "*/Application/*.txt" -type f | sort | tail -3 \
              | xargs -I{} sh -c 'echo "--- {} ---"; tail -400 {}' 2>/dev/null \
              || echo "(no Application/*.txt logs found)"
            echo "=== Docker logs ==="
            find "$LOG_DIR" -name "*docker.log" -type f | sort | tail -2 \
              | xargs -I{} sh -c 'echo "--- {} ---"; tail -150 {}' 2>/dev/null \
              || echo "(no docker.log found)"
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [infra]
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.infra.outputs.swa_api_key }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend/browser
          app_build_command: npx ng build --configuration production
